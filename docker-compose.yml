services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-notes_api}
      MYSQL_USER: ${MYSQL_USER:-notes_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-notes_pass_123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass_123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  django:
    build:
      context: .
      dockerfile: Dockerfile.django
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-notes_api}
      MYSQL_USER: ${MYSQL_USER:-notes_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-notes_pass_123}
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    environment:
      FASTAPI_DATABASE_URL: mysql+pymysql://${MYSQL_USER:-notes_user}:${MYSQL_PASSWORD:-notes_pass_123}@db:3306/${MYSQL_DATABASE:-notes_api}
      FASTAPI_JWT_SECRET_KEY: ${FASTAPI_JWT_SECRET_KEY:-change-this-fastapi-secret}
    depends_on:
      - db
    ports:
      - "8001:8001"

  nginx:
    image: nginx:1.27
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - django

volumes:
  mysql_data:
